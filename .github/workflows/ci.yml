name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Luacheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lunarmodules/luacheck@v1
        with:
          args: lua tests --no-color --ignore 631

  test:
    name: Test (Neovim ${{ matrix.nvim_version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        nvim_version: [v0.9.5, v0.10.0, v0.11.0, stable, nightly]
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.nvim_version }}

      - name: Install plenary.nvim
        run: |
          git clone --depth 1 https://github.com/nvim-lua/plenary.nvim /tmp/plenary.nvim

      - name: Run tests
        run: |
          nvim --headless -u tests/minimal_init.lua \
            -c "PlenaryBustedDirectory tests/ { minimal_init = 'tests/minimal_init.lua' }"

  auto-tag:
    name: Auto Tag
    if: github.ref == 'refs/heads/main'
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        run: |
          LATEST=$(git tag --sort=-v:refname | grep '^v' | head -1 || echo "v0.0.0")
          # Extract major.minor.patch and bump patch
          RAW=$(echo "$LATEST" | sed 's/^v//')
          MAJOR=$(echo "$RAW" | cut -d. -f1)
          MINOR=$(echo "$RAW" | cut -d. -f2)
          PATCH=$(echo "$RAW" | cut -d. -f3)
          NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "Latest: $LATEST → Next: $NEXT"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEXT"
          git push origin "$NEXT"

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
