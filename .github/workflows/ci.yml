name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Luacheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lunarmodules/luacheck@v1
        with:
          args: lua tests --no-color --ignore 631

  test:
    name: Test (Neovim ${{ matrix.nvim_version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        nvim_version: [v0.8.0, v0.9.5, v0.10.0, stable, nightly]
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.nvim_version }}

      - name: Install plenary.nvim
        run: |
          git clone --depth 1 https://github.com/nvim-lua/plenary.nvim /tmp/plenary.nvim

      - name: Run tests
        run: |
          nvim --headless -u tests/minimal_init.lua \
            -c "PlenaryBustedDirectory tests/ { minimal_init = 'tests/minimal_init.lua' }" &
          NVPID=$!
          # Wait up to 60s, then force-kill nvim (server integration tests may leave
          # open libuv handles that prevent clean exit)
          for i in $(seq 1 60); do
            if ! kill -0 $NVPID 2>/dev/null; then
              wait $NVPID
              exit $?
            fi
            sleep 1
          done
          kill $NVPID 2>/dev/null
          wait $NVPID 2>/dev/null
          echo "::warning::nvim did not exit cleanly after 60s (likely open libuv handles from server tests)"

  release:
    name: Release (tag push only)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
