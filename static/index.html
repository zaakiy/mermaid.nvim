<html lang="en">

<head>

  {{SCRIPTS}}
</head>

<body data-theme="{{THEME_MODE}}">

          d="m19.6 21l-6.3-6.3q-.75.6-1.725.95T9.5 16q-2.725 0-4.612-1.888T3 9.5t1.888-4.612T9.5 3t4.613 1.888T16 9.5q0 1.1-.35 2.075T14.7 13.3l6.3 6.3zM9.5 14q1.875 0 3.188-1.312T14 9.5t-1.312-3.187T9.5 5T6.313 6.313T5 9.5t1.313 3.188T9.5 14m-1-1.5v-2h-2v-2h2v-2h2v2h2v2h-2v2z" />

      <svg viewBox="0 0 24 24" fill="currentColor">
        <path
          d="m19.6 21l-6.3-6.3q-.75.6-1.725.95T9.5 16q-2.725 0-4.612-1.888T3 9.5t1.888-4.612T9.5 3t4.613 1.888T16 9.5q0 1.1-.35 2.075T14.7 13.3l6.3 6.3zM9.5 14q1.875 0 3.188-1.312T14 9.5t-1.312-3.187T9.5 5T6.313 6.313T5 9.5t1.313 3.188T9.5 14M7 10.5v-2h5v2z" />

          d="M12 20q-3.35 0-5.675-2.325T4 12t2.325-5.675T12 4q1.725 0 3.3.712T18 6.75V4h2v7h-7V9h4.2q-.8-1.4-2.187-2.2T12 6Q9.5 6 7.75 7.75T6 12t1.75 4.25T12 18q1.925 0 3.475-1.1T17.65 14h2.1q-.7 2.65-2.85 4.325T12 20" />
      </svg>
    </button>
    <div style="height: 1px; background: #ccc; margin: 2px 0;"></div>
    <button id="btn-copy" title="Copy Image (PNG)">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path
          d="M9 18q-.825 0-1.412-.587T7 16V4q0-.825.588-1.412T9 2h9q.825 0 1.413.588T20 4v12q0 .825-.587 1.413T18 18zm-4 4q-.825 0-1.412-.587T3 20V6h2v14h11v2z" />
      </svg>
    </button>
    <button id="btn-download" title="Download SVG">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path
          d="m12 16l-5-5l1.4-1.45l2.6 2.6V4h2v8.15l2.6-2.6L17 11zm-6 4q-.825 0-1.412-.587T4 18v-3h2v3h12v-3h2v3q0 .825-.587 1.413T18 20z" />

    </button>
  </div>
  <div class="mermaid" id="graph-container"></div>
  <div id="error-container"></div>
  <div id="connection-status"></div>

  <script type="module">
// --- SSE with exponential backoff ---
let evtSource = null;
let sseRetryCount = 0;
let sseConnected = false;

function connectSSE() {
    evtSource = new EventSource("/events");

    evtSource.onmessage = function (event) {
        // Reset retry count on successful message
        sseRetryCount = 0;
        sseConnected = true;
        updateConnectionStatus('connected');
        try {
            const content = JSON.parse(event.data);
            if (window.renderGraph) {
                window.renderGraph(content);
            } else {
                window.pendingContent = content;
            }
        } catch (e) {
            console.error("Parse error", e);
            showError("Parse error: " + e.message);
        }
    };

    evtSource.onerror = function (err) {
        sseRetryCount++;
        const backoff = Math.min(1000 * Math.pow(2, sseRetryCount), 30000);
        console.warn(`SSE error (attempt ${sseRetryCount}), reconnecting in ${backoff}ms...`);
        updateConnectionStatus('reconnecting', backoff, sseRetryCount);

        // Close and reconnect with exponential backoff
        evtSource.close();
        setTimeout(() => connectSSE(), backoff);
    };

    evtSource.onopen = function () {
        sseRetryCount = 0;
        sseConnected = true;
        updateConnectionStatus('connected');
    };
}

function updateConnectionStatus(state, delay, attempt) {
    const el = document.getElementById('connection-status');
    if (!el) return;

    if (state === 'connected') {
        el.textContent = '● Connected';
        el.style.color = '#4ade80';
        el.style.display = 'block';
    } else if (state === 'reconnecting') {
        el.textContent = `◌ Reconnecting (${delay}ms, attempt ${attempt})`;
        el.style.color = '#fbbf24';
        el.style.display = 'block';
    } else if (state === 'disconnected') {
        el.textContent = '○ Disconnected';
        el.style.color = '#f87171';
        el.style.display = 'block';
    }
}

function showError(msg) {
    const el = document.getElementById('error-container');
    if (!el) return;
    el.textContent = msg;
    el.style.display = 'block';
}

// Start SSE connection
connectSSE();

    import { initPreview } from '/js/preview.js';
    initPreview("{{RENDERER}}", "{{THEME}}", "{{THEME_MODE}}");
  </script>
</body>

</html>
